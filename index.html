<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 末日進度追蹤</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 SortableJS 用於拖拽功能 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { background-color: #fee2e2; border-color: #ef4444; }
            50% { background-color: #fecaca; border-color: #dc2626; }
        }
        .animate-urgent {
            animation: pulse-red 2s infinite;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            touch-action: manipulation; /* 優化移動端觸控 */
        }
        /* 拖拽時的樣式 */
        .sortable-ghost {
            opacity: 0.3;
            transform: scale(0.95);
        }
        .sortable-drag {
            cursor: grabbing;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1) !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-pink-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultData = [
            { id: '1', name: '雪隨風飄', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '23', mine1: '25', crystal: '30' },
            { id: '2', name: '°ǒ雨醉伴花眠ǒ°', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '10', mine1: '25', crystal: '30' },
            { id: '3', name: '煙火消逝的瞬間⁎✿', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '28', mine1: '25', crystal: '30' },
            { id: '4', name: '福壽山蜜蘋果･ω･', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '', mine1: '', crystal: '' },
            { id: '5', name: '拉拉山水蜜桃･ὢ･', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '', mine1: '', crystal: '' },
            { id: '6', name: '好好吃的芭樂', daily: true, commander: true, hero: true, mall: true, base: true, ops: true, event: true, water: true, pack: '19', mine1: '19', crystal: '19' },
            { id: '10', name: '小小1號', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '20', mine1: '20', crystal: '20' },
            { id: '11', name: '小小2號', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '6', mine1: '20', crystal: '20' },
            { id: '12', name: '小小3號', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '20', mine1: '22', crystal: '22' },
            { id: '13', name: '小小4號', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '26', mine1: '20', crystal: '20' },
            { id: '14', name: '小小5號', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '24', mine1: '11', crystal: '11' },
            { id: '15', name: '小小6號', daily: true, commander: false, hero: false, mall: true, base: true, ops: true, event: true, water: true, pack: '22', mine1: '22', crystal: '22' },
        ];

        const taskCheckboxes = [
            { key: 'daily', label: '每日' },
            { key: 'commander', label: '指揮官' },
            { key: 'hero', label: '英雄周' },
            { key: 'mall', label: '商城' },
            { key: 'base', label: '種子' },
            { key: 'ops', label: '特種' },
            { key: 'event', label: '節日' },
            { key: 'water', label: '淨水' },
        ];

        const countdownFields = [
            { key: 'pack', label: '救援包' },
            { key: 'mine1', label: '黃金礦' },
            { key: 'crystal', label: '晶核' },
        ];

        const Icons = {
            Check: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Rotate: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>,
            Plus: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            User: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Upload: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Trophy: () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></svg>,
            Move: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="opacity-20"><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="15 19 12 22 9 19"></polyline><polyline points="19 9 22 12 19 15"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
        };

        function App() {
            const [accounts, setAccounts] = useState(defaultData);
            const [appTitle, setAppTitle] = useState('🌸 末日進度追蹤');
            const [showImportModal, setShowImportModal] = useState(false);
            const [importText, setImportText] = useState('');
            const [notification, setNotification] = useState('');
            const gridRef = useRef(null);
            const sortableInstance = useRef(null);

            // 初始化時讀取 LocalStorage
            useEffect(() => {
                const saved = localStorage.getItem('puzzles_survival_v5_sortable');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.accounts) setAccounts(parsed.accounts);
                        if (parsed.appTitle) setAppTitle(parsed.appTitle);
                    } catch(e) { console.error(e); }
                }
            }, []);

            // 初始化 SortableJS
            useEffect(() => {
                if (gridRef.current && !sortableInstance.current) {
                    sortableInstance.current = Sortable.create(gridRef.current, {
                        animation: 150,
                        ghostClass: 'sortable-ghost',
                        dragClass: 'sortable-drag',
                        delay: 200, // 長按 200ms 觸發移動，避免干擾滾動
                        delayOnTouchOnly: true,
                        filter: 'input, button, textarea', // 排除這些元素的拖動觸發
                        preventOnFilter: false,
                        onEnd: (evt) => {
                            const { oldIndex, newIndex } = evt;
                            if (oldIndex === newIndex) return;
                            
                            setAccounts(prev => {
                                const newData = [...prev];
                                const [removed] = newData.splice(oldIndex, 1);
                                newData.splice(newIndex, 0, removed);
                                // 立即儲存新順序
                                const updatedTitle = appTitle;
                                localStorage.setItem('puzzles_survival_v5_sortable', JSON.stringify({ 
                                    accounts: newData, 
                                    appTitle: updatedTitle 
                                }));
                                return newData;
                            });
                        }
                    });
                }
            }, [gridRef.current, appTitle]);

            const saveData = (newAccounts, newTitle) => {
                const updatedAcc = newAccounts || accounts;
                const updatedTitle = newTitle !== undefined && newTitle !== null ? newTitle : appTitle;
                setAccounts([...updatedAcc]);
                setAppTitle(updatedTitle);
                localStorage.setItem('puzzles_survival_v5_sortable', JSON.stringify({ 
                    accounts: updatedAcc, 
                    appTitle: updatedTitle 
                }));
            };

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 3000);
            };

            const resetDaily = () => {
                const newAccounts = accounts.map(acc => {
                    const decr = (val) => {
                        if (!val) return '';
                        const num = parseInt(val, 10);
                        if (isNaN(num)) return '';
                        return (num - 1).toString();
                    };
                    return {
                        ...acc,
                        daily: false, mall: false, water: false, base: false, ops: false, event: false,
                        pack: decr(acc.pack), mine1: decr(acc.mine1), crystal: decr(acc.crystal),
                    };
                });
                saveData(newAccounts);
                showNotify('換日重置成功！🗓️');
            };

            const getNumberStyle = (val) => {
                if (!val) return 'bg-white border-slate-100';
                const num = parseInt(val, 10);
                if (isNaN(num)) return 'bg-white border-slate-100';
                if (num <= 0) return 'animate-urgent border-red-500 text-red-600 cursor-pointer';
                if (num === 1) return 'bg-orange-50 border-orange-300 text-orange-600';
                return 'bg-white border-slate-200 text-pink-600';
            };

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto space-y-6 select-none">
                    {notification && (
                        <div className="fixed top-4 right-4 z-[100] bg-pink-500 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 animate-bounce text-sm font-bold">
                            <span>{notification}</span>
                        </div>
                    )}

                    {/* 頂部導覽 */}
                    <div className="flex flex-col md:flex-row items-center justify-between gap-4 bg-white/80 backdrop-blur-md p-4 rounded-3xl shadow-sm border border-pink-100 sticky top-4 z-50">
                        <input
                            type="text"
                            value={appTitle}
                            onChange={(e) => saveData(null, e.target.value)}
                            className="bg-transparent border-none focus:outline-none text-xl md:text-2xl font-black text-pink-600 w-full text-center md:text-left select-text"
                        />
                        <div className="flex items-center gap-3 w-full md:w-auto">
                            <button onClick={resetDaily} className="flex-1 md:flex-none bg-pink-500 hover:bg-pink-600 text-white px-6 py-2.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                                <Icons.Rotate /> 換日重置
                            </button>
                            <button onClick={() => setShowImportModal(true)} className="p-2.5 text-pink-400 hover:bg-pink-100 rounded-2xl transition-colors bg-white border border-pink-50">
                                <Icons.Upload />
                            </button>
                        </div>
                    </div>

                    <div className="text-center md:text-left">
                        <span className="text-[10px] text-slate-400 font-bold bg-slate-100 px-3 py-1 rounded-full uppercase tracking-widest">
                            💡 電腦可直接拖拽 / 手機長按 0.2 秒後可移動卡片
                        </span>
                    </div>

                    {/* 卡片容器 (SortableJS 目標) */}
                    <div ref={gridRef} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 min-h-[100px]">
                        {accounts.map((acc) => (
                            <div key={acc.id} className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-pink-50 hover:shadow-md transition-all cursor-default">
                                {/* 角色頭部 */}
                                <div className="flex items-center justify-between mb-4 border-b border-pink-50 pb-3">
                                    <div className="flex items-center gap-2 flex-1">
                                        <div className="text-pink-400"><Icons.User /></div>
                                        <input 
                                            type="text" 
                                            value={acc.name} 
                                            onChange={(e) => saveData(accounts.map(a => a.id === acc.id ? {...a, name: e.target.value} : a))} 
                                            className="font-black text-slate-700 w-full focus:outline-none bg-transparent text-lg select-text" 
                                        />
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <Icons.Move />
                                        <button 
                                            onClick={() => saveData(accounts.filter(a => a.id !== acc.id))} 
                                            className="text-slate-200 hover:text-rose-400 p-1 transition-colors"
                                        >
                                            <Icons.Trash />
                                        </button>
                                    </div>
                                </div>

                                {/* 任務按鈕組 */}
                                <div className="grid grid-cols-4 gap-2 mb-4">
                                    {taskCheckboxes.map(task => (
                                        <div key={task.key} className="flex flex-col items-center">
                                            <span className={`text-[10px] font-bold mb-1 truncate w-full text-center ${acc[task.key] ? 'text-pink-500' : 'text-slate-400'}`}>
                                                {task.label}
                                            </span>
                                            <button 
                                                onClick={() => saveData(accounts.map(a => a.id === acc.id ? {...a, [task.key]: !a[task.key]} : a))} 
                                                className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${acc[task.key] ? 'bg-pink-500 text-white shadow-md' : 'bg-slate-50 text-slate-100 border border-slate-100'}`}
                                            >
                                                {acc[task.key] && <Icons.Check />}
                                            </button>
                                        </div>
                                    ))}
                                </div>

                                {/* 底部倒數組 */}
                                <div className="grid grid-cols-3 gap-2 pt-3 border-t border-pink-50">
                                    {countdownFields.map(field => (
                                        <div key={field.key} className="flex flex-col items-center">
                                            <span className="text-[10px] font-black text-slate-400 mb-1">{field.label}</span>
                                            <div 
                                                className={`relative flex items-center justify-center w-full rounded-xl border-2 transition-all h-10 ${getNumberStyle(acc[field.key])}`}
                                                onClick={() => {
                                                    if (parseInt(acc[field.key], 10) <= 0) {
                                                        saveData(accounts.map(a => a.id === acc.id ? {...a, [field.key]: '30'} : a));
                                                        showNotify(`領取成功！${field.label}已重置`);
                                                    }
                                                }}
                                            >
                                                <input 
                                                    type="text" 
                                                    value={(parseInt(acc[field.key], 10) <= 0) ? '領取' : (acc[field.key] || '')} 
                                                    onChange={(e) => {
                                                        const val = e.target.value;
                                                        if (val === '領取') return;
                                                        saveData(accounts.map(a => a.id === acc.id ? {...a, [field.key]: val.replace(/\D/g,'')} : a));
                                                    }} 
                                                    className="w-full bg-transparent text-center font-black text-xs outline-none select-text" 
                                                    placeholder="-"
                                                />
                                                {(acc[field.key] && parseInt(acc[field.key], 10) > 0) && (
                                                    <span className="absolute right-0.5 bottom-0.5 text-[8px] opacity-40">D</span>
                                                )}
                                                {(parseInt(acc[field.key], 10) <= 0) && (
                                                    <div className="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full p-0.5 shadow-sm scale-110">
                                                        <Icons.Trophy />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 新增按鈕 (放在 grid 之外，避免參與排序) */}
                    <div className="flex justify-center pt-4">
                        <button onClick={() => {
                            const newId = Date.now().toString();
                            saveData([...accounts, { id: newId, name: '新角色', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }]);
                        }} className="w-full max-w-md py-6 border-4 border-dashed border-pink-100 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 text-pink-200 hover:text-pink-400 hover:border-pink-300 transition-all bg-white/40 hover:bg-white active:scale-95">
                            <Icons.Plus size={40} />
                            <span className="font-black">新增角色卡片</span>
                        </button>
                    </div>

                    {/* 備份彈窗 */}
                    {showImportModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-8">
                                <h3 className="text-pink-500 font-black mb-6 flex items-center gap-2 text-xl"><Icons.Upload /> 備份與還原</h3>
                                <textarea
                                    value={importText}
                                    onChange={(e) => setImportText(e.target.value)}
                                    className="w-full h-48 bg-slate-50 border border-slate-100 rounded-2xl p-4 text-xs font-mono mb-6 focus:ring-2 focus:ring-pink-200 outline-none select-text"
                                    placeholder='貼上備份代碼...'
                                ></textarea>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => { setImportText(JSON.stringify({accounts})); showNotify('已生成代碼！'); }} className="py-4 text-pink-600 font-black text-sm bg-white rounded-2xl border border-pink-100 hover:bg-pink-50">複製備份</button>
                                    <button onClick={() => {
                                        try {
                                            const p = JSON.parse(importText);
                                            saveData(p.accounts);
                                            setShowImportModal(false);
                                            showNotify('還原成功！✨');
                                        } catch(e) { showNotify('代碼錯誤！'); }
                                    }} className="py-4 bg-pink-500 text-white rounded-2xl font-black text-sm shadow-lg shadow-pink-100">執行還原</button>
                                </div>
                                <button onClick={() => setShowImportModal(false)} className="w-full mt-6 text-slate-400 text-xs font-bold">關閉彈窗</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
